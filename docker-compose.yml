services:
  init-paths:
    image: alpine
    command: >
      sh -c "
        echo '[init] ensure dirs exist';
        mkdir -p /host/db_data;
        mkdir -p /host/data/backups;
        mkdir -p /host/data/celery;
        mkdir -p /host/data/media/local_import;
        mkdir -p /host/data/media/originals;
        mkdir -p /host/data/media/playback;
        mkdir -p /host/data/media/thumbs;
        mkdir -p /host/data/tmp;
        mkdir -p /host/data/uploads;
        echo '[init] apply correct ownership';
        chown -R 999:999 /host/db_data;
        chmod -R 770 /host/db_data;
        chown -R 1000:1000 /host/data;
        chmod -R 775 /host/data;
        echo '[init] done';
      "
    volumes:
      - ${HOST_DATA_ROOT:-/volume1/docker/photonest}:/host
    restart: "no"

  db:
    image: ${DB_IMAGE:-photonest-db:latest}
    container_name: ${DB_CONTAINER_NAME:-mariadb}
    environment:
      - TZ=UTC
      # 初期設定のみ（.env 未作成／項目未記入）でも DB が初期化されるよう
      # デフォルト値を持つ。既定の資格情報は「まず動作すること」を優先した
      # 開発向けの値であり、外部公開する環境では .env で必ず上書きすること。
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-photonest123}
      - MARIADB_USER=${MARIADB_USER:-web_user}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD:-photonest123}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-appdb}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    env_file:
      - .env
    volumes:
      - ${HOST_DATA_ROOT:-/volume1/docker/photonest}/db_data:/var/lib/mysql
    command:
      - --default-time-zone=+00:00
    depends_on:
      init-paths:
        condition: service_completed_successfully
    healthcheck:
      # $$ でエスケープし、docker compose にパスワードを展開させずコンテナ内シェルの
      # 環境変数参照のまま渡す（`docker events` / `docker inspect` に平文が残るのを防ぐ）。
      # --protocol=tcp を明示: "-h 127.0.0.1" だけだと mysqladmin がデフォルトで
      # Unix ソケット経由に倒れることがあり、MariaDB 公式イメージが初回初期化時に
      # 立てる一時ブートストラップサーバー（ネットワーク非公開・ソケットのみ）にも
      # ping が通ってしまう。他コンテナから db:3306 へ実際に接続できるようになる前に
      # healthy と誤判定され、reset 直後の alembic upgrade が接続失敗するのを防ぐ。
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --protocol=tcp -u root -p\"$$MARIADB_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 10s
      # 初回起動（reset 直後の空 db_data）は「システムテーブル初期化 → 一時サーバー →
      # 本サーバー起動」を経る（スキーマは web コンテナの alembic upgrade head で構築）。
      # Synology NAS の遅いディスクではシステムテーブル初期化だけで2〜3分かかる実績があり、
      # 一時サーバー（ソケットのみ・port 0）の間は上の TCP ping は意図的に失敗し続けるため、
      # start_period が短いと初期化が終わる前に unhealthy 判定されて
      # 「dependency failed to start: container mariadb is unhealthy」で落ちる。
      # start_period 中も probe は interval ごとに走り、成功すれば即 healthy になるので、
      # 長めに取っても通常起動（2回目以降）が遅くなることはない。
      retries: 30
      start_period: 600s

  web:
    image: ${WEB_IMAGE:-photonest:latest}
    init: true
    stop_grace_period: 60s
    command: web
    # 公開ポートは nginx が受け持つ（下記 nginx サービス）。web はネットワーク内部
    # からのみ到達可能にする。X-Accel-Redirect を既定で有効にしているため、web へ
    # 直接アクセスすると内部配信ヘッダーが解釈されず壊れる。必ず nginx 経由にする。
    expose:
      - "5000"
    environment:
      - TZ=UTC
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:5000}
      - DATABASE_URI=mysql+pymysql://${MARIADB_USER:-web_user}:${MARIADB_PASSWORD:-photonest123}@db:3306/${MARIADB_DATABASE:-appdb}?charset=utf8mb4
      # Redis / Celery は compose 内の redis サービスを既定の接続先とする。
      # アプリ側デフォルト（redis://localhost:6379/0）はコンテナ内では届かないため、
      # ここで必ず redis ホスト＋既定パスワードを注入する。
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
      # メディアは nginx が X-Accel-Redirect で直接配信する（既定で有効）。
      # accel location / メディアディレクトリは settings 既定（/media/*,
      # /app/data/media/*）を使うため個別指定は不要。無効化したい場合は .env で上書き。
      - MEDIA_ACCEL_REDIRECT_ENABLED=${MEDIA_ACCEL_REDIRECT_ENABLED:-true}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${HOST_DATA_ROOT:-/volume1/docker/photonest}/data:/app/data
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    healthcheck:
      # API_BASE_URL は外部公開ドメイン（CORS等）用のため、コンテナ内部からの疎通確認には使わない。
      # 外部ドメインを名前解決できない環境（NAS 側 DNS 未設定等）だと
      # socket.gaierror: Name or service not known で毎回失敗する。
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health/live')\""]
      interval: 30s
      timeout: 10s
      # web コンテナは db が healthy になってから起動する（depends_on condition:
      # service_healthy）。db 自身の start_period は 600s まで許容しているため
      # （Synology NAS の遅いディスクでは db 単体の初期化だけで2〜3分かかる）、
      # web はさらにその後に DB 接続待ち + `alembic upgrade head`（reset 直後は
      # init_master 全テーブル + seed_master_data + gunicorn/uvicorn 起動）を
      # こなす必要がある。旧 start_period 40s + retries 3 × interval 30s = 130s では
      # この合計時間にわずかに届かず、実際にアプリは数秒後に正常起動していたにも
      # かかわらず docker compose に unhealthy と誤判定され
      # 「dependency failed to start」でデプロイが失敗した実績があるため延長する。
      # start_period 中も probe は interval ごとに走り、成功すれば即 healthy になる
      # ので、長めに取っても通常起動（2回目以降・db 初期化不要時）が遅くなることはない。
      retries: 5
      start_period: 300s

  nginx:
    image: nginx:1.27-alpine
    # 公開フロント。外部リバースプロキシ／CDN からはこのポートへ接続する。
    ports:
      - "${WEB_BIND_ADDR:-127.0.0.1}:${WEB_HOST_PORT:-8050}:80"
    environment:
      - TZ=UTC
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # X-Accel-Redirect でメディアを直接配信するため、データを読み取り専用で共有。
      - ${HOST_DATA_ROOT:-/volume1/docker/photonest}/data:/app/data:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # web へプロキシした /health/live で疎通確認（busybox wget）。
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    image: ${WEB_IMAGE:-photonest:latest}
    init: true
    stop_grace_period: 60s
    command: worker
    environment:
      - TZ=UTC
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:5000}
      - DATABASE_URI=mysql+pymysql://${MARIADB_USER:-web_user}:${MARIADB_PASSWORD:-photonest123}@db:3306/${MARIADB_DATABASE:-appdb}?charset=utf8mb4
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${HOST_DATA_ROOT:-/volume1/docker/photonest}/data:/app/data
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[c]elery.*worker' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  beat:
    image: ${WEB_IMAGE:-photonest:latest}
    init: true
    stop_grace_period: 60s
    command: beat
    volumes:
      - ${HOST_DATA_ROOT:-/volume1/docker/photonest}/data/celery:/app/data
    environment:
      - TZ=UTC
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:5000}
      - DATABASE_URI=mysql+pymysql://${MARIADB_USER:-web_user}:${MARIADB_PASSWORD:-photonest123}@db:3306/${MARIADB_DATABASE:-appdb}?charset=utf8mb4
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-photonest123}@redis:6379/0}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[c]elery.*beat' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --user
      - default
      - on
      - ">${REDIS_PASSWORD:-photonest123}"
      - +@all
      - ~*
      - allchannels
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    environment:
      - TZ=UTC
      - REDIS_PASSWORD=${REDIS_PASSWORD:-photonest123}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      # $$ でエスケープし docker compose 展開を避ける（`docker events` に平文パスワードが
      # 出力されるのを防ぐ）。コンテナ内の REDIS_PASSWORD 環境変数をシェルが解決する。
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  media_data:
  thumb_data:
  playback_data:

networks:
  default:
    name: ${DOCKER_NETWORK_NAME:-photonest-dev}
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.22.0.0/16}
