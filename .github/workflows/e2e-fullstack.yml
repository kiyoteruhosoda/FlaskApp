name: Fullstack E2E

# 実 FastAPI ＋ 実DB（SQLite）＋ ビルド済み SPA を起動し、初期管理者で全画面を
# 巡回する重い E2E。既定の軽量スイート（API モック）とは分離し、専用ジョブで実行する。
# 実行タイミング: 手動実行・毎日深夜・関連ファイルを変更する PR。
on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # 毎日 03:00 JST 相当（UTC 18:00）
  pull_request:
    paths:
      - "frontend/e2e-fullstack/**"
      - "frontend/playwright.fullstack.config.ts"
      - "presentation/fastapi/**"
      - "scripts/run_db_migrations.py"
      - "migrations/**"

jobs:
  fullstack-e2e:
    name: Admin fullstack walkthrough
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run fullstack E2E
        working-directory: frontend
        env:
          CI: "true"
        # webServer コマンドが SPA ビルド → マイグレーション → uvicorn 起動まで行う。
        run: npm run test:e2e:fullstack

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-fullstack
          path: frontend/playwright-report/
          retention-days: 7
