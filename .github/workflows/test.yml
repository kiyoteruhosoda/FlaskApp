name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  migration-consistency:
    name: Migration ↔ Model consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migration/model drift guard
        env:
          TESTING: "true"
        run: |
          pytest tests/integration/test_migration_model_consistency.py
