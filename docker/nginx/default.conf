# Photonest リバースプロキシ + メディア直接配信（X-Accel-Redirect）。
#
# 役割:
#   1. 通常のリクエストは web（gunicorn）へプロキシする。
#   2. 署名付きメディア URL（/api/dl/<token>）に対し web が返す
#      `X-Accel-Redirect: /media/<種別>/<rel>` を受けて、nginx がディスクから
#      ファイルを直接配信する（Python をバイト転送の経路から外して高速化）。
#
# internal 指定により、/media/* へ外部から直接アクセスしても 404 になり、
# 署名検証を通った内部リダイレクト時のみ配信される（署名バイパス防止）。
#
# alias 先は settings の既定（system_settings_defaults.py）と一致:
#   MEDIA_THUMBNAILS_DIRECTORY = /app/data/media/thumbs
#   MEDIA_PLAYBACK_DIRECTORY   = /app/data/media/playback
#   MEDIA_ORIGINALS_DIRECTORY  = /app/data/media/originals
# accel location 既定:
#   MEDIA_ACCEL_THUMBNAILS_LOCATION = /media/thumbs 等

upstream photonest_web {
    server web:5000;
}

server {
    listen 80;
    server_name _;

    # アップロード上限（ローカルインポート等）。必要に応じて調整。
    client_max_body_size 2048m;

    # X-Accel-Redirect の内部配信ロケーション（外部直アクセスは 404）。
    # Content-Type / Cache-Control / Content-Disposition は upstream(web) の
    # レスポンスヘッダーがそのまま使われる。
    location /media/thumbs/ {
        internal;
        alias /app/data/media/thumbs/;
    }
    location /media/playback/ {
        internal;
        alias /app/data/media/playback/;
    }
    location /media/originals/ {
        internal;
        alias /app/data/media/originals/;
    }

    location / {
        proxy_pass http://photonest_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 動画のシーク・大きなオリジナル配信に備えたタイムアウト。
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # X-Accel-Redirect を使うため、web からのレスポンスバッファリングは
        # 既定のままでよい（ヘッダーのみで本文は内部ロケーションが返す）。
    }
}
